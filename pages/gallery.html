<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gallery | AL Hind Educational and Charitable Trust</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Explore photos from our education, welfare, and community development programs across Bihar.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/gallery.css">
</head>

<body>

    <div id="header"></div>

    <!-- HERO -->
    <section class="gallery-hero">
        <div class="hero-bg-pattern"></div>
        <div class="gallery-hero-inner">
            <div class="gallery-hero-badge">
                <i class="fa-solid fa-camera-retro"></i>
                Our Work in Action
            </div>
            <h1>Moments That <span class="hero-accent">Matter</span></h1>
            <p>Snapshots from our educational programs, health camps, community outreach and volunteer activities across
                Bihar.</p>
            <div class="gallery-hero-stats">
                <div class="ghs-item">
                    <span class="ghs-num" id="stat-photos">—</span>
                    <span class="ghs-lbl"><i class="fa-solid fa-images"></i> Photos</span>
                </div>
                <div class="ghs-divider"></div>
                <div class="ghs-item">
                    <span class="ghs-num" id="stat-cats">—</span>
                    <span class="ghs-lbl"><i class="fa-solid fa-tags"></i> Categories</span>
                </div>
                <div class="ghs-divider"></div>
                <div class="ghs-item">
                    <span class="ghs-num">12+</span>
                    <span class="ghs-lbl"><i class="fa-solid fa-calendar-days"></i> Years</span>
                </div>
            </div>
        </div>
    </section>

    <!-- FILTER + VIEW TOGGLE (sticky) -->
    <div class="gallery-filter-sticky">
        <div class="gallery-filter-bar" id="gallery-filter-bar">
            <button class="gfb-btn active" data-cat="all">
                <i class="fa-solid fa-border-all"></i>
                <span>All</span>
                <span class="gfb-count" id="fcount-all">0</span>
            </button>
            <!-- Category buttons injected by gallery.js -->
        </div>
        <div class="gallery-view-toggle">
            <button class="gvt-btn active" id="view-masonry" onclick="setViewMode('masonry')" title="Masonry view">
                <i class="fa-solid fa-grip"></i> Masonry
            </button>
            <button class="gvt-btn" id="view-grid" onclick="setViewMode('grid')" title="Grid view">
                <i class="fa-solid fa-table-cells"></i> Grid
            </button>
        </div>
    </div>

    <!-- GALLERY -->
    <section class="gallery-section">
        <div class="container">
            <div class="masonry-grid" id="masonry-grid">
                <!-- skeleton loaders -->
                <div class="masonry-skeleton"></div>
                <div class="masonry-skeleton tall"></div>
                <div class="masonry-skeleton"></div>
                <div class="masonry-skeleton wide"></div>
                <div class="masonry-skeleton tall"></div>
                <div class="masonry-skeleton"></div>
                <div class="masonry-skeleton"></div>
                <div class="masonry-skeleton wide"></div>
            </div>
            <div class="gallery-load-more" id="load-more-wrap" style="display:none">
                <button class="btn-load-more" id="load-more-btn" onclick="loadMore()">
                    <i class="fa-solid fa-circle-down"></i> Load More Photos
                </button>
            </div>
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox" role="dialog" aria-modal="true">
        <div class="lightbox-backdrop" onclick="closeLightbox()"></div>

        <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)" aria-label="Previous">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="lightbox-content">
            <!-- Top bar -->
            <div class="lightbox-topbar">
                <div class="lb-left">
                    <span class="lb-counter" id="lb-counter"></span>
                    <span class="lb-cat-badge" id="lb-cat-badge"></span>
                </div>
                <div class="lb-right">
                    <a class="lb-action-btn" id="lb-download" title="Download" download>
                        <i class="fa-solid fa-download"></i> Download
                    </a>
                    <button class="lb-action-btn lb-close-btn" onclick="closeLightbox()" title="Close">
                        <i class="fa-solid fa-xmark"></i> Close
                    </button>
                </div>
            </div>
            <!-- Image -->
            <div class="lb-img-wrap">
                <img class="lightbox-img" id="lb-img" alt="">
                <div class="lb-spinner" id="lb-spinner">
                    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                </div>
            </div>
            <!-- Caption -->
            <div class="lb-meta">
                <p class="lb-caption" id="lb-caption"></p>
            </div>
        </div>

        <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)" aria-label="Next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <div id="footer"></div>

    <script src="/js/include.js" defer></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/header-animate.js" defer></script>
    <script src="/js/gallery.js" defer></script>
</body>

</html>
