<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Events | AL Education and Trust</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pageload_animation.css">

    <style>
        /* PAGE */

        body {

            font-family: Segoe UI;
            background: #f4f6f9;
            margin: 0;

        }

        h2 {

            text-align: center;
            margin-top: 30px;
            color: #0f3d2e;

        }


        /* GRID */

        .event-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(320px, 1fr));

            gap: 25px;

            padding: 30px;

        }


        /* CARD */

        .event-card {

            background: white;

            border-radius: 12px;

            overflow: hidden;

            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);

            transition: .3s;

        }

        .event-card:hover {

            transform: translateY(-6px);

        }


        /* IMAGE */

        .event-card img {

            width: 100%;
            height: 220px;
            object-fit: cover;

        }


        .event-body {

            padding: 15px;

        }

        .badge {

            background: #0f3d2e;

            color: white;

            padding: 5px 10px;

            border-radius: 6px;

            font-size: 13px;

        }


        .btn {

            background: #0f3d2e;

            color: white;

            padding: 8px 14px;

            border-radius: 6px;

            text-decoration: none;

            display: inline-block;

            margin-top: 10px;

        }


        /* MAP */

        .map {

            width: 100%;
            height: 250px;
            border: 0;
            margin-top: 10px;

        }


        /* FILTER */

        .filter {

            text-align: center;
            margin: 20px;

        }

        button {

            padding: 10px 15px;

            border: none;

            background: #0f3d2e;

            color: white;

            border-radius: 8px;

            margin: 5px;

            cursor: pointer;

        }
    </style>

    <!-- Meta Pixel Code -->
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1235764274660948');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=1235764274660948&ev=PageView&noscript=1" />
    </noscript>
    <!-- End Meta Pixel Code -->

</head>


<body>

    <!-- HEADER -->
    <div id="header"></div>

    <h2>NGO Events & Activities</h2>


    <div class="filter">

        <button onclick="showAll()">All</button>

        <button onclick="showUpcoming()">Upcoming</button>

        <button onclick="showPast()">Past</button>

    </div>



    <div class="event-grid" id="events">

        <!-- EVENT CARD -->

        <div class="event-card" data-date="2026-03-10">

            <img src="images/event1.jpg">

            <div class="event-body">

                <h3>Free Medical Camp</h3>

                <p>

                    <span class="badge">

                        📅 10 March 2026

                    </span>

                </p>

                <p>

                    📍 Madhepura Bihar

                </p>

                <p>

                    Health checkup camp organised
                    for rural families.

                </p>

                <!-- GOOGLE MAP -->

                <iframe class="map" src="https://www.google.com/maps?q=Madhepura,Bihar&output=embed">

                </iframe>

                <a href="join.html" class="btn">

                    Join Event →

                </a>

            </div>

        </div>



        <!-- EVENT 2 -->

        <div class="event-card" data-date="2025-12-20">

            <img src="images/event2.jpg">

            <div class="event-body">

                <h3>Winter Blanket Distribution</h3>

                <p>

                    <span class="badge">

                        📅 20 Dec 2025

                    </span>

                </p>

                <p>

                    📍 Saharsa Bihar

                </p>

                <p>

                    Helping needy families during winter.

                </p>

                <iframe class="map" src="https://www.google.com/maps?q=Saharsa,Bihar&output=embed">

                </iframe>

                <a href="join.html" class="btn">

                    Join Event →

                </a>

            </div>

        </div>


    </div>



    <script>

        /* TODAY DATE */

        const today =
            new Date().toISOString().split('T')[0];

        const cards =
            document.querySelectorAll(".event-card");


        function showAll() {

            cards.forEach(c => c.style.display = "block");

        }


        function showUpcoming() {

            cards.forEach(card => {

                card.style.display =

                    card.dataset.date >= today
                        ? "block" : "none";

            });

        }


        function showPast() {

            cards.forEach(card => {

                card.style.display =

                    card.dataset.date < today
                        ? "block" : "none";

            });

        }

    </script>



<!-- FOOTER -->
<div id="footer"></div>

<script src="js/include.js"></script>
<script src="js/main.js" defer></script>
<script src="js/header-animate.js" defer></script>

</body>

</html>
